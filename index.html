    <script>
        // Redirect to language subfolder if browser language is not English
        (function() {
            const supported = ['tr','ar','fa','ru','fr'];
            const userLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
            // Only redirect if not English and not already inside a subfolder
            if (supported.includes(userLang) && window.location.pathname === '/index.html' || window.location.pathname === '/') {
                window.location.replace('./' + userLang + '/index.html');
            }
        })();
    </script>
